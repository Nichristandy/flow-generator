.end { fill: #f8cecc; stroke: #b85450; stroke-width: 3; }
.text { font-family: sans-serif; font-size: 12px; text-anchor: middle; dominant-baseline: middle; }
.edge { fill: none; stroke: #000; stroke-width: 1.5; }
.edge-label { font-family: sans-serif; font-size: 11px; fill: #555; background-color: white; }
</style>

